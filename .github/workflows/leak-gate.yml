# Leak gate: fails the build if anything that looks like a credential,
# a private address, or an internal reference lands in the tree.
#
# This repo is developed public-first against a private homelab, so the
# gate is the structural guarantee that "oops" commits become CI failures
# instead of incidents. The patterns here are deliberately generic;
# maintainers should ALSO run any personal pre-push checks (e.g. for
# their own hostnames) locally — putting those strings in a public
# workflow would itself leak them.
#
# This file is excluded from its own scan (it contains the patterns).
# Fix flagged text rather than allowlisting it.

name: Leak gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  leak-gate:
    name: Credential & identifier scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head safely
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.number && format('refs/pull/{0}/head', github.event.pull_request.number) || github.sha }}
          fetch-depth: 1

      - name: Scan tree
        run: |
          set -u
          PATTERNS=(
            # --- credentials / key material ---
            'sk-(ant-)?[A-Za-z0-9_-]{20,}'                # API keys (sk-/sk-ant- style)
            'gh[pousr]_[A-Za-z0-9]{30,}'                  # GitHub tokens
            'github_pat_[A-Za-z0-9_]{20,}'                # GitHub fine-grained PATs
            'AKIA[0-9A-Z]{16}'                            # AWS access key IDs
            'AIza[0-9A-Za-z_-]{30,}'                      # Google API keys
            '-----BEGIN [A-Z ]*PRIVATE KEY-----'          # PEM private keys
            'tskey-[a-z]+-[A-Za-z0-9-]+'                  # Tailscale auth keys
            'xox[baprs]-[A-Za-z0-9-]{10,}'                # Slack tokens
            'eyJhbGciOi[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{10,}\.' # literal JWTs
            # --- private / internal addresses ---
            '\b10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\b'
            '\b192\.168\.[0-9]{1,3}\.[0-9]{1,3}\b'
            '\b172\.(1[6-9]|2[0-9]|3[01])\.[0-9]{1,3}\.[0-9]{1,3}\b'
            '\b100\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\.[0-9]{1,3}\.[0-9]{1,3}\b'  # Tailscale CGNAT
            'tail[0-9a-f]{6,}\.ts\.net'                   # real tailnet names (placeholder tailnet-name.ts.net passes)
            # --- internal project references ---
            'LEO-[0-9]+'                                  # private issue-tracker IDs
            'linear\.app'                                 # private tracker links
          )
          JOINED=$(IFS='|'; echo "${PATTERNS[*]}")
          if hits=$(grep -rInE "$JOINED" . \
                --exclude-dir=.git \
                --exclude='leak-gate.yml'); then
            echo "::error::Leak gate found suspicious content:"
            echo "$hits"
            exit 1
          fi
          echo "Leak gate clean."
