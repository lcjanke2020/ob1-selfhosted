# Leak gate: fails the build if anything that looks like a credential,
# a private address, or an internal reference lands in the tree.
#
# This repo is developed public-first against a private homelab, so the
# gate is the structural guarantee that "oops" commits become CI failures
# instead of incidents. The patterns are deliberately generic; maintainers
# should ALSO run any personal pre-push checks (e.g. for their own hostnames)
# locally — putting those strings in a public workflow would itself leak them.
#
# The pattern set lives in .github/leak-patterns.txt — a single source of truth
# shared with the opt-in local hook (.githooks/pre-commit) so the two can't
# drift. That file is excluded from the scan (it holds the patterns); fix
# flagged text rather than allowlisting it.

name: Leak gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  leak-gate:
    name: Credential & identifier scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head safely
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.number && format('refs/pull/{0}/head', github.event.pull_request.number) || github.sha }}
          fetch-depth: 1

      - name: Scan tree
        run: |
          set -u
          PAT_FILE=.github/leak-patterns.txt
          # One ERE: drop comment/blank lines, join the rest with '|'.
          JOINED=$(grep -vE '^[[:space:]]*(#|$)' "$PAT_FILE" | paste -sd '|' -)
          if [ -z "$JOINED" ]; then
            echo "::error::no patterns loaded from $PAT_FILE"
            exit 1
          fi
          # Fail CLOSED on a malformed ERE: grep exits 2 on a bad pattern, which
          # the scan's `if` would otherwise read as "no hits" and pass green with
          # the gate silently off. Compile-check against empty input first.
          printf '' | grep -Eq -- "$JOINED" 2>/dev/null
          rc=$?
          if [ "$rc" -ge 2 ]; then
            echo "::error::invalid regex in $PAT_FILE (grep exit $rc)"
            exit 1
          fi
          if hits=$(grep -rInE "$JOINED" . \
                --exclude-dir=.git \
                --exclude='leak-gate.yml' \
                --exclude='leak-patterns.txt' \
                --exclude='test-pre-commit.sh'); then
            echo "::error::Leak gate found suspicious content:"
            echo "$hits"
            exit 1
          fi
          echo "Leak gate clean."
