# CPU-only Ollama override — for hosts without a GPU.
#
# NOTE: the per-qube app-qube/docker-compose.yml already runs Ollama CPU-only
# (it omits the GPU reservation outright), so it does NOT need this override.
# This file is retained for the single-app-qube on-ramp (base stack on a GPU-less
# host) layered alongside docker-compose.external-db.yml.
#
# The base compose reserves an nvidia device for the ollama service; on a
# GPU-less host that reservation makes the container fail to start. This clears
# just the GPU device reservation via `!reset`
# (needs a Compose v2 that supports `!reset`; v2.24.4 documents it). CPU-only
# nomic-embed-text embedding is sub-second per request, fine for personal recall.
#
# Layer it after the other compose files, e.g.:
#   COMPOSE_FILE=../compose-local/docker-compose.yml:../compose-tailnet/docker-compose.pattern-b.yml:docker-compose.external-db.yml:docker-compose.cpu-ollama.yml
services:
  ollama:
    # Surgical: reset only the GPU device reservation, not the whole `deploy`
    # block — so a future deploy.resources.limits / restart_policy on base
    # ollama survives on GPU-less hosts instead of being silently dropped.
    deploy:
      resources:
        reservations:
          devices: !reset []
