# DB qube bind-dirs — what must survive an AppVM reboot.
#
# Install at: /rw/config/qubes-bind-dirs.d/50_user.conf
#
# A stock AppVM persists only /home, /usr/local, and /rw. Everything the DB qube
# depends on lives elsewhere, so bind-dir each of these into /rw. Pre-create the
# backing dir under /rw/bind-dirs/<path> (empty) before the first reboot into the
# bind; qubes-bind-dirs seeds it from the template on first boot.
#
# After editing, apply without a reboot with:  sudo /usr/lib/qubes/bind-dirs.sh

binds+=( '/var/lib/postgresql' )     # PGDATA — the cluster itself
binds+=( '/etc/postgresql' )         # hardened cluster config (pg_hba.conf, postgresql.conf, conf.d)
binds+=( '/var/lib/tailscale' )      # Tailscale node identity (machine key, prefs)
