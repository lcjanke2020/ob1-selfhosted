# pg_hba.conf snippet for the DB qube.
#
# Append to: /etc/postgresql/<version>/main/pg_hba.conf  (e.g. .../17/main/...)
#
# The app roles may connect to the `openbrain` database from the app qube's
# tailnet IP ONLY, authenticated with scram-sha-256. The superuser is never
# given a network host line — it stays loopback-only. This is the PG-layer gate
# that sits on top of the Tailscale ACL and the nft tailscale0:5432 rule.
#
# Replace <app-qube-tailnet-ip> with the app qube's tailnet address.
#
# TYPE  DATABASE     USER                 ADDRESS                    METHOD
host    openbrain    openbrain_app        <app-qube-tailnet-ip>/32    scram-sha-256
host    openbrain    openbrain_ingester   <app-qube-tailnet-ip>/32    scram-sha-256
host    openbrain    openbrain_readonly   <app-qube-tailnet-ip>/32    scram-sha-256
