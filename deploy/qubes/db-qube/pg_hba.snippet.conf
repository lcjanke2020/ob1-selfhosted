# pg_hba.conf snippet for the DB qube.
#
# Append to: /etc/postgresql/<version>/main/pg_hba.conf  (e.g. .../17/main/...)
#
# Each role is scoped to the qube that actually uses it, authenticated with
# scram-sha-256. This is the PG-layer gate that sits on top of the Tailscale ACL
# and the nft tailscale0:5432 rule.
#
# The superuser (`postgres`) is given a host line from the APP qube's IP ONLY, so
# the app qube can run remote DB administration (role provisioning + schema
# migrations) over the tailnet. This is a deliberate trade-off — a compromised
# app qube then has full DB admin (incl. COPY ... TO/FROM PROGRAM = command
# execution as the postgres OS user here, i.e. an app->db OS pivot), not just the
# app role — accepted for now because the app role already reads/writes every
# thought and this qube is highly contained; future work scopes admin down to a
# non-superuser migration role (GitHub #15). The superuser gets NO line from the
# ingress qube. `DATABASE all` because CREATE DATABASE /
# CREATE ROLE connect to the `postgres` maintenance DB, not `openbrain`. Match the
# role name to POSTGRES_USER if you changed it from the `postgres` default.
#
# Two peers in the three-qube split (replace both placeholders):
#   <app-qube-tailnet-ip>     — the APP qube. Holds the superuser (remote admin),
#                               the app role (mcp writes thoughts), and the
#                               readonly role (the encrypted backup job).
#   <ingress-qube-tailnet-ip> — the INGRESS/caddy qube. Runs the log-ingester,
#                               which writes funnel_access_log as the INSERT-only
#                               openbrain_ingester role.
#
# openbrain_ingester only exists in the Pattern B split (created when
# OPENBRAIN_INGESTER_PASSWORD is set — see db/00-roles.sh). Under Pattern A drop
# that line, or leave it: a host line for a nonexistent role simply never matches.
# (Single-app-qube on-ramp: if the log-ingester runs ON the app qube rather than
# a separate ingress qube, set the ingester address to <app-qube-tailnet-ip> too.)
#
# TYPE  DATABASE     USER                 ADDRESS                        METHOD
host    all          postgres             <app-qube-tailnet-ip>/32        scram-sha-256   # superuser remote admin from the app qube
host    openbrain    openbrain_app        <app-qube-tailnet-ip>/32        scram-sha-256
host    openbrain    openbrain_readonly   <app-qube-tailnet-ip>/32        scram-sha-256
host    openbrain    openbrain_ingester   <ingress-qube-tailnet-ip>/32    scram-sha-256   # Pattern B; runs on the ingress qube
