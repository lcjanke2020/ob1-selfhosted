# pg_hba.conf snippet for the DB qube.
#
# Append to: /etc/postgresql/<version>/main/pg_hba.conf  (e.g. .../17/main/...)
#
# Each role is scoped to the qube that actually uses it, authenticated with
# scram-sha-256. The superuser is never given a network host line — it stays
# loopback-only. This is the PG-layer gate that sits on top of the Tailscale ACL
# and the nft tailscale0:5432 rule.
#
# Two peers in the three-qube split (replace both placeholders):
#   <app-qube-tailnet-ip>     — the APP qube. Holds the app role (mcp writes
#                               thoughts) and the readonly role (the encrypted
#                               backup job dumps via openbrain_readonly).
#   <ingress-qube-tailnet-ip> — the INGRESS/caddy qube. Runs the log-ingester,
#                               which writes funnel_access_log as the INSERT-only
#                               openbrain_ingester role.
#
# openbrain_ingester only exists in the Pattern B split (created when
# OPENBRAIN_INGESTER_PASSWORD is set — see db/00-roles.sh). Under Pattern A drop
# that line, or leave it: a host line for a nonexistent role simply never matches.
# (Single-app-qube on-ramp: if the log-ingester runs ON the app qube rather than
# a separate ingress qube, set the ingester address to <app-qube-tailnet-ip> too.)
#
# TYPE  DATABASE     USER                 ADDRESS                        METHOD
host    openbrain    openbrain_app        <app-qube-tailnet-ip>/32        scram-sha-256
host    openbrain    openbrain_readonly   <app-qube-tailnet-ip>/32        scram-sha-256
host    openbrain    openbrain_ingester   <ingress-qube-tailnet-ip>/32    scram-sha-256   # Pattern B; runs on the ingress qube
