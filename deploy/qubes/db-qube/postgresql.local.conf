# Local Postgres settings for the DB qube.
#
# Apply as a drop-in (/etc/postgresql/<version>/main/conf.d/) or via ALTER SYSTEM
# (which persists in PGDATA/postgresql.auto.conf). Both are captured by the
# /var/lib/postgresql + /etc/postgresql bind-dirs and survive reboots.
#
# Replace <db-qube-tailnet-ip> with this qube's own tailnet address.

# Bind loopback + the DB qube's tailnet IP (not 0.0.0.0). Postgres must start
# after tailscale0 has its IP, or this bind fails — see rc.local.
listen_addresses = 'localhost,<db-qube-tailnet-ip>'

# Disable server-side TLS: the only client reaches this DB over the tailnet,
# which is WireGuard-encrypted end to end, so PG-level TLS is redundant here and
# Debian's default snakeoil cert otherwise makes the client log a noisy
# "UnknownIssuer -> defaulting to non-encrypted connection" on every pool conn.
ssl = off
