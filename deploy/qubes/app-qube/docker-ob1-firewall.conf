# Drop-in for docker.service — re-apply the OB1 DOCKER-USER scoping rule after
# EVERY docker daemon start/restart, not just at boot.
#
# Stash at (the DURABLE source): /rw/config/docker-ob1-firewall.conf
# rc.local copies it to /etc/systemd/system/docker.service.d/ob1-firewall.conf on
# every boot and runs `systemctl daemon-reload`. Do NOT install it only at the
# runtime path — /etc/systemd/system is wiped on every AppVM reboot, so without
# the /rw/config copy rc.local would have nothing to restage and later docker
# restarts would stop re-applying the rule.
#
# WHY: docker recreates the DOCKER-USER chain (and its trailing RETURN, flushing
# our inserted rules) whenever the daemon restarts. The boot-time one-shot
# (ob1-app-firewall.service) only fires once at boot, so a later `systemctl
# restart docker` would silently reopen the LAN-facing 0.0.0.0:8787 bind until
# the next reboot. ExecStartPost re-applies the rule on every (re)start. The
# script is idempotent and INSERTs above docker's freshly-added RETURN, so it is
# safe to run after dockerd is up.
[Service]
# Leading `-`: never fail docker's start if the rule apply errors (the script
# also exits 0 defensively and logs failures to /var/log/ob1-app-firewall.log).
ExecStartPost=-/rw/config/qubes-firewall-user-script
