# Open Brain — app qube (three-qube split).
#
# Self-contained compose for the APP qube in the three-qube Qubes topology
# (ingress / app / db — see ../three-qube-design.md). This file runs the
# application half ONLY:
#
#   mcp     — The Open Brain MCP server (Deno + Hono). Published on
#             0.0.0.0:8787 so the ingress qube's Caddy can reach it over the
#             tailnet (see the 3-layer scoping note on the `ports` key below).
#             Connects to the canonical Postgres on the dedicated DB qube
#             (DB_HOST in .env), writing thoughts as the openbrain_app role.
#   ollama  — Embeddings, CPU-only (a Qubes app qube has no GPU passthrough).
#             Point OLLAMA_URL at an external GPU box to offload it.
#
# What this qube does NOT run: caddy, the log-ingester, and Postgres — those
# live on the ingress and db qubes respectively. This is a deliberate split:
# the file simply doesn't define them, so the app qube cannot start them.
#
# Credentials: this is the trusted compartment, so its .env holds the
# admin/superuser POSTGRES_PASSWORD — used to administer the db qube REMOTELY over
# the tailnet (role provisioning + schema/migrations), which the db-qube pg_hba
# allows from THIS qube's IP only (a deliberate trade-off; see ../db-qube/README.md)
# — plus the openbrain_app password (mcp writes thoughts) and the openbrain_readonly
# password (the encrypted backup job — see backup/). It never holds the
# log-ingester credential; that lives only on the ingress qube.
#
# Run (from this directory, after copying .env.example to .env):
#   docker compose up -d
#
# Network lockdown: mcp's 0.0.0.0:8787 bind is scoped to the ingress qube by
# THREE independent layers — Tailscale ACL, the host firewall
# (qubes-firewall-user-script in this dir, a DOCKER-USER drop), and mcp app
# auth. The bind itself grants no protection. See README.md + the firewall
# script header.

services:
  mcp:
    build:
      context: ../../../server
    restart: unless-stopped
    # Defense-in-depth: mcp already runs as a non-root `deno` user (see
    # server/Dockerfile). Dropping all kernel capabilities and the rootfs
    # read-only trims the post-compromise blast radius. /tmp is writable
    # via tmpfs for any transient OS tempfile use (deno-postgres pool,
    # fetch keepalive, etc.). no-new-privileges:true prevents setuid
    # escalation even if a hypothetical setuid binary slips into the image.
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    security_opt:
      - no-new-privileges:true
    # No `depends_on`: the database is on the dedicated db qube, not in this
    # compose project — there is no local postgres health-gate to wait on.
    environment:
      # The canonical Postgres lives on the dedicated DB qube. DB_HOST is
      # MANDATORY here (no `postgres` service to fall back to): `:?` makes
      # compose fail at `config` time with this message rather than failing
      # only at connect time against a nonexistent host.
      DB_HOST: ${DB_HOST:?set DB_HOST to the db qube tailnet address (the three-qube split has no local postgres)}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${POSTGRES_DB:-openbrain}
      DB_USER: openbrain_app
      # `:?` (not plain ${VAR}) so a blank value after `cp .env.example .env`
      # fails at `docker compose config` time, not as a runtime DB-auth error.
      DB_PASSWORD: ${OPENBRAIN_APP_PASSWORD:?set OPENBRAIN_APP_PASSWORD (the app role mcp connects as)}
      DB_POOL_SIZE: "10"
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      EMBED_DIM: ${EMBED_DIM:-768}
      CHAT_API_BASE: ${CHAT_API_BASE:-}
      CHAT_API_KEY: ${CHAT_API_KEY:-}
      CHAT_MODEL: ${CHAT_MODEL:-}
      CHAT_TIMEOUT_MS: ${CHAT_TIMEOUT_MS:-60000}
      # Fallback chat endpoint — tried only when the primary CHAT_* call above
      # fails (unreachable/error/timeout/unparseable). Lets a local-first
      # primary (e.g. a GPU box reached via the forwarder below) degrade to a
      # hosted model instead of dropping metadata when that box is down. Blank
      # = disabled. NOTE: the fallback path CAN send thought content off-box.
      FALLBACK_CHAT_API_BASE: ${FALLBACK_CHAT_API_BASE:-}
      FALLBACK_CHAT_API_KEY: ${FALLBACK_CHAT_API_KEY:-}
      FALLBACK_CHAT_MODEL: ${FALLBACK_CHAT_MODEL:-}
      # Opt-in safety gate for the PRIMARY (CHAT_*) call. Off unless "true": when
      # off, extraction skips the primary and uses the fallback. Leave off until
      # the primary endpoint is verified reachable + safe.
      ENABLE_PRIMARY_EXTRACTION: ${ENABLE_PRIMARY_EXTRACTION:-}
      MCP_ACCESS_KEY: ${MCP_ACCESS_KEY}
      CITATION_BASE_URL: ${CITATION_BASE_URL:-https://openbrain.local/thoughts}
      AUTH0_ISSUER: ${AUTH0_ISSUER:-}
      AUTH0_JWKS_URI: ${AUTH0_JWKS_URI:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      JWKS_FETCH_TIMEOUT_MS: ${JWKS_FETCH_TIMEOUT_MS:-10000}
      OBS_AUTH_EVENTS_ENABLED: ${OBS_AUTH_EVENTS_ENABLED:-true}
      OBS_AUTH_EVENTS_MAX_IN_FLIGHT: ${OBS_AUTH_EVENTS_MAX_IN_FLIGHT:-500}
      AUTH_BODY_READ_TIMEOUT_MS: ${AUTH_BODY_READ_TIMEOUT_MS:-2000}
      PORT: "8787"
      # config.ts fail-fast: with AUTH0_* set, PATTERN_B must be "true". OAuth
      # is enforced here; the header-strip boundary PATTERN_B also guards is
      # enforced by Caddy on the ingress qube.
      PATTERN_B: "true"
    # Published on ALL host interfaces (0.0.0.0) so the ingress qube's Caddy can
    # reach mcp across qubes over the tailnet — the single-qube Pattern B kept
    # this on loopback because Caddy shared the host; here Caddy is elsewhere.
    # The bind grants no protection on its own; reachability is restricted to
    # the ingress qube by three independent layers, none of which is the bind:
    #   1. Tailscale ACL  — only the ingress qube → this qube:8787.
    #   2. Host firewall  — a DOCKER-USER rule dropping :8787 from anything but
    #      the ingress qube (docker DNAT bypasses the qubes INPUT chain, so the
    #      rule must live in DOCKER-USER). See qubes-firewall-user-script here.
    #   3. mcp app auth   — x-brain-key for tailnet, OAuth Bearer JWT for funnel.
    ports:
      - "0.0.0.0:8787:8787"
    # To offload metadata classification to an external GPU box, reach a
    # host-side forwarder on :11434 via THIS compose network's gateway — NOT
    # host.docker.internal / docker0, which a container on a user-defined bridge
    # can't reach (inter-bridge isolation). Find the gateway with:
    #   docker network inspect app-qube_default -f '{{(index .IPAM.Config 0).Gateway}}'
    # and set CHAT_API_BASE=http://<that-gateway-ip>:11434/v1. For a STABLE
    # gateway, pin it in a local (uncommitted) docker-compose.override.yml.

  ollama:
    # Pinned to the version currently in production (0.24.0). Bump deliberately
    # when you're ready to re-test embeddings/chat output — `:latest` is a
    # supply-chain risk and a silent-upgrade footgun.
    image: ollama/ollama:0.24.0
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    # No GPU reservation: a Qubes app qube has no GPU passthrough, so CPU-only
    # nomic-embed-text (sub-second per request, fine for personal recall). To
    # offload embeddings to a GPU box, remove this service and point OLLAMA_URL
    # at it instead.

volumes:
  ollama_data:

# Reaching a host-side GPU forwarder (see the CHAT_API_BASE note on the mcp
# service) needs a stable gateway IP for THIS bridge. Pin it in a LOCAL,
# uncommitted docker-compose.override.yml (keeps your private subnet out of
# git) — compose auto-merges it:
#   networks:
#     default:
#       ipam:
#         config:
#           - subnet: <your-private-/24>
#             gateway: <your-gateway-ip>   # bind the forwarder + CHAT_API_BASE here
