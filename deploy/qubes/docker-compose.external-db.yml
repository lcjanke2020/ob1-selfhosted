# External-DB override — Postgres out of compose, into a dedicated DB qube.
#
# NOTE: the canonical three-qube split now uses the SELF-CONTAINED per-qube
# compose files in app-qube/ and ingress-qube/ (just `docker compose up -d` in
# each), which don't need this override. This file is retained for the simpler
# on-ramp of a SINGLE app qube running the whole base stack against an external
# Postgres — layer it on ../compose-local/docker-compose.yml as shown below.
#
# This is the compose-side of pulling Postgres out (see three-qube-design.md and
# issue #4): the `postgres` service is removed from the running stack and the mcp
# server + log-ingester are pointed at an external Postgres reached over a
# firewall-scoped tailnet link (default-deny except the app qube).
#
# What it does:
#   1. Parks the bundled `postgres` service under a profile that is never
#      activated, so `docker compose up` does not start it. (DB_HOST in .env
#      points mcp/log-ingester at the real database instead.)
#   2. Clears the `depends_on: postgres` health-gate on mcp and log-ingester —
#      there is no local postgres to wait on. Uses the `!reset` tag (compose
#      needs a Compose v2 that supports `!reset`; v2.24.4 documents it), same mechanism as
#      docker-compose.pattern-b.yml's `ports: !reset`.
#   3. Makes DB_HOST mandatory under this override (fail-fast at `docker compose
#      config` time, not at connect time), and gates the log-ingester entry
#      behind the `pattern-b` profile so this file is safe to load even without
#      docker-compose.pattern-b.yml.
#
# Usage (with the Pattern B + Funnel stack):
#   In .env:
#     DB_HOST=<db-qube-tailnet-ip>           # the DB qube's tailnet address
#     COMPOSE_FILE=../compose-local/docker-compose.yml:../compose-tailnet/docker-compose.pattern-b.yml:docker-compose.external-db.yml:docker-compose.cpu-ollama.yml
#     COMPOSE_PROFILES=pattern-b
#   then: docker compose up -d
#
# Verify the bundled postgres is excluded before bringing the stack up:
#   docker compose config --services        # must NOT list `postgres`
#
# The app role (openbrain_app) and the log-ingester role (openbrain_ingester)
# must exist on the external DB with the passwords in .env, and the external
# Postgres must permit the app qube's IP (pg_hba scram). See deploy/qubes/README.md.

services:
  # Never started: assigned a profile that the deploy never activates. The base
  # file declares `postgres` with no profile (always-on); naming a profile here
  # replaces that, gating it out of `docker compose up`.
  postgres:
    profiles:
      - bundled-db-disabled

  mcp:
    # No local postgres to gate on; DB_HOST points elsewhere.
    depends_on: !reset null
    environment:
      # Fail-fast: with the bundled `postgres` parked, an unset DB_HOST would
      # default to the now-nonexistent `postgres` name and fail only at connect
      # time. `:?` makes compose error at config time with this message instead.
      DB_HOST: ${DB_HOST:?set DB_HOST to the external Postgres address (e.g. the DB qube) when layering the external-db override}

  # Gated behind `pattern-b` (where the service is actually defined) so loading
  # this override WITHOUT docker-compose.pattern-b.yml doesn't leave a bodyless
  # `log-ingester` with no image/build.
  log-ingester:
    profiles:
      - pattern-b
    depends_on: !reset null
    environment:
      DB_HOST: ${DB_HOST:?set DB_HOST to the external Postgres address (e.g. the DB qube) when layering the external-db override}
