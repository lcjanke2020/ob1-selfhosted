# App-qube override — the application half of the ingress/app split.
#
# Runs the app services (mcp + ollama) ONLY. The public edge — Tailscale Funnel
# + Caddy — and the log-ingester stay on the separate ingress qube. The ingress
# qube's Caddy reverse-proxies to this qube's mcp over the tailnet (set
# MCP_UPSTREAM in the ingress qube's .env to this qube's address:8787).
#
# Layer this WITHOUT docker-compose.pattern-b.yml and WITHOUT
# COMPOSE_PROFILES=pattern-b, so:
#   - caddy        (base file, profile `pattern-b`)  → not started
#   - log-ingester (pattern-b file)                  → not started
#   - postgres     (parked by docker-compose.external-db.yml)
# leaving just mcp + ollama. Invocation from deploy/qubes:
#
#   DB_HOST=<db-qube-tailnet-ip> \
#   COMPOSE_FILE=../compose-local/docker-compose.yml:docker-compose.external-db.yml:docker-compose.cpu-ollama.yml:docker-compose.app-qube.yml \
#   docker compose up -d
#
# Network exposure: mcp's port is published on 0.0.0.0:8787 — ALL of this qube's
# host interfaces, not just tailscale0. The bind grants no protection on its own;
# reachability is restricted to the ingress qube by THREE independent layers
# below, none of which is the bind address or this compose file:
#   1. Tailscale ACL  — only the ingress qube → this qube:8787 (enforced at this
#      node's tailscaled packet filter; other peers are dropped at the wire).
#   2. Host firewall  — a DOCKER-USER rule dropping tailscale0:8787 from anything
#      but the ingress qube (docker DNAT bypasses the qubes INPUT chain, so the
#      rule must live in DOCKER-USER, not the standard custom-input).
#   3. mcp app auth   — unchanged application-layer boundary (server/auth.ts):
#      x-brain-key for tailnet requests, OAuth Bearer JWT for funnel requests.

services:
  mcp:
    # Re-publish mcp on the tailnet. The single-qube Pattern B unpublished this
    # port because Caddy shared the host; here Caddy is on a different qube, so
    # the port must be reachable over the tailnet. See the 3-layer scoping above.
    #
    # `!override` REPLACES the base `127.0.0.1:8787:8787` mapping. Compose merges
    # list-valued fields (like `ports`) across files by default, so without this
    # the container would inherit BOTH binds and fail at start with
    # "address already in use" (0.0.0.0:8787 already covers 127.0.0.1:8787).
    #
    # Needs a Compose v2 that supports the `!override` tag — v2.24.4, the same
    # release that documents the `!reset` tag the other override files here rely
    # on. Older Compose fails with a YAML parse error on the unknown tag.
    ports: !override
      - "0.0.0.0:8787:8787"
    environment:
      # server/config.ts fail-fast: with AUTH0_* set, PATTERN_B must be "true".
      # OAuth is still enforced here; the header-strip boundary that PATTERN_B
      # also guards is enforced by Caddy on the ingress qube.
      PATTERN_B: "true"
